# Sentiment Analysis App - Render Blueprint Specification
# Reference: https://render.com/docs/blueprints

services:
  - type: web
    name: sentiment-analysis-app
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
